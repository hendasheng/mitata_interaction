<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美瞳交互展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin: 0;
            padding: 15px 0;
            font-size: 1.5em;
            background: rgba(0, 0, 0, 0.8);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .display-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding-top: 60px;
        }

        .text-display {
            position: relative;
            width: 100%;
            height: 66.66%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #333;
            overflow: visible;
        }

        .text-display.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999;
            border-bottom: none;
        }

        #textCanvas {
            display: block;
            max-width: none;
            max-height: none;
            object-fit: contain;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 33.33%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #video {
            display: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        .tp-dfwv {
            width: 300px !important;
        }

        .status {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 100;
        }

        .status.loading {
            background: rgba(255, 243, 205, 0.9);
            color: #856404;
        }

        .status.ready {
            background: rgba(212, 237, 218, 0.9);
            color: #155724;
        }

        .status.error {
            background: rgba(248, 215, 218, 0.9);
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> </h1>

        <div id="status" class="status loading">正在加载模型...</div>

        <div class="display-area">
            <!-- 上半部分：文本效果展示 (2/3) -->
            <div class="text-display">
                <canvas id="textCanvas"></canvas>
            </div>

            <!-- 下半部分：实时摄像头捕捉 (1/3) -->
            <div class="canvas-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
        </div>

        <div id="controls" class="controls"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.10/dist/tweakpane.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="app.js"></script>
</body>
</html>
