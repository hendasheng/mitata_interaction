<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美瞳交互展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin: 0;
            padding: 15px 0;
            font-size: 1.5em;
            background: rgba(0, 0, 0, 0.8);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .display-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding-top: 60px;
        }

        .text-display {
            position: relative;
            width: 100%;
            height: 66.66%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #333;
        }

        #textCanvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 33.33%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #video {
            display: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 50px;
            z-index: 100;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 13px;
            color: #ccc;
            font-weight: 500;
        }

        input[type="text"], input[type="number"], select {
            padding: 6px 10px;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 13px;
            background: #222;
            color: #fff;
            transition: border-color 0.3s;
        }

        input[type="range"] {
            width: 120px;
            cursor: pointer;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 100;
        }

        .status.loading {
            background: rgba(255, 243, 205, 0.9);
            color: #856404;
        }

        .status.ready {
            background: rgba(212, 237, 218, 0.9);
            color: #155724;
        }

        .status.error {
            background: rgba(248, 215, 218, 0.9);
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> </h1>

        <div id="status" class="status loading">正在加载模型...</div>

        <div class="display-area">
            <!-- 上半部分：文本效果展示 (2/3) -->
            <div class="text-display">
                <canvas id="textCanvas"></canvas>
            </div>

            <!-- 下半部分：实时摄像头捕捉 (1/3) -->
            <div class="canvas-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="fillText">填充文本</label>
                <input type="text" id="fillText" value="mitata" placeholder="输入文本">
            </div>

            <div class="control-group">
                <label for="fontSize">字体大小</label>
                <input type="number" id="fontSize" value="8" min="4" max="20">
            </div>

            <div class="control-group">
                <label for="textColor">文本颜色</label>
                <input type="text" id="textColor" value="#ffffff" placeholder="#ffffff">
            </div>

            <div class="control-group">
                <label for="scaleSlider">放大倍数: <span id="scaleValue">2.0</span>x</label>
                <input type="range" id="scaleSlider" min="1" max="10" step="0.1" value="2">
            </div>

            <div class="control-group">
                <label for="maskSize">瞳孔遮罩: <span id="maskSizeValue">1.0</span>x</label>
                <input type="range" id="maskSize" min="0" max="2" step="0.1" value="1">
            </div>

            <button id="startBtn">开始捕捉</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="app.js"></script>
</body>
</html>
